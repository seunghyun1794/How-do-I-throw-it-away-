<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="재활용 및 분리배출 질문에 대한 답변 페이지"
  >

  <title>질문 답변 | 어떻게 버리지?</title>

  <link rel="stylesheet" href="./answer.css">
</head>

<body>
  <header class="answer-header">
    <button
      type="button"
      class="back-button"
      aria-label="홈으로 돌아가기"
      onclick="goHome()"
    >
      ←
    </button>

    <div class="header-text">
      <p class="header-label">♻️ 어떻게 버리지?</p>
      <h1>질문 답변</h1>
    </div>
  </header>

  <main class="answer-main">
    <section class="question-card">
      <div class="section-title">
        <span class="section-icon">💬</span>

        <div>
          <p class="section-label">사용자 질문</p>
          <h2>무엇이 궁금하신가요?</h2>
        </div>
      </div>

      <p
        id="questionText"
        class="question-text"
      >
        질문을 불러오는 중입니다.
      </p>
    </section>

    <section
      id="loadingSection"
      class="status-card loading-section"
      aria-live="polite"
    >
      <div
        class="spinner"
        aria-hidden="true"
      ></div>

      <h2>답변을 준비하고 있어요</h2>

      <p>
        재활용 관련 질문인지 확인하고<br>
        적절한 답변을 정리하고 있어요.
      </p>
    </section>

    <section
      id="answerSection"
      class="answer-card"
      aria-live="polite"
      hidden
    >
      <div class="section-title">
        <span class="section-icon">🤖</span>

        <div>
          <p class="section-label">Gemma AI 답변</p>
          <h2>답변</h2>
        </div>
      </div>

      <div
        id="answerText"
        class="answer-text"
      ></div>

      <div class="notice-box">
        <span aria-hidden="true">ℹ️</span>

        <p>
          분리배출 기준은 지역과 주거 형태에 따라 달라질 수 있습니다.
          정확한 내용은 관할 지자체 안내도 함께 확인해 주세요.
        </p>
      </div>
    </section>

    <section
      id="errorSection"
      class="status-card error-section"
      aria-live="assertive"
      hidden
    >
      <div class="error-icon" aria-hidden="true">
        ⚠️
      </div>

      <h2>답변을 불러오지 못했습니다</h2>

      <p id="errorText">
        서버에서 질문을 처리하지 못했습니다.
      </p>

      <button
        id="retryButton"
        type="button"
        class="primary-button"
        onclick="retryQuestion()"
      >
        다시 시도
      </button>
    </section>

    <div class="page-button-group">
      <button
        type="button"
        class="secondary-button"
        onclick="goHome()"
      >
        ← 홈으로 돌아가기
      </button>

      <button
        type="button"
        class="primary-button"
        onclick="retryQuestion()"
      >
        답변 다시 받기
      </button>
    </div>
  </main>

  <footer class="site-footer">
    <p>
      © 2026 코드스케치업. All rights reserved.
    </p>
  </footer>

  <noscript>
    <div class="noscript-message">
      이 페이지를 사용하려면 JavaScript를 활성화해야 합니다.
    </div>
  </noscript>

  <script src="./answer.js"></script>
</body>
</html>
